<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .for-dark { display: none }
    @media (prefers-color-scheme: dark) {
      .for-light { display: none }
      .for-dark { display: inline }
    }
  </style>
  <image class="for-light" width="32" height="32" href="data:image/png;base64,"/>
  <image class="for-dark" width="32" height="32" href="data:image/png;base64,"/>
</svg>
