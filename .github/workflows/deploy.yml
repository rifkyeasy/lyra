name: Deploy to VPS

# On every push to main (or manual run), SSH to the VPS, pull latest, build, and
# reload the Lyra web console (pm2). Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'knowledge-sui/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/lyra
            git pull --ff-only
            bash scripts/deploy-vps.sh
