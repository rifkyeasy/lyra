name: Deploy to VPS

# On every push to main or dev (or manual run), SSH to the VPS, check out the
# pushed branch, build, and reload the Lyra web console (pm2). Deploying the
# pushed branch keeps dev iteration continuous while main stays promotable.
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY.
on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'knowledge-sui/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: BRANCH
          script: |
            set -e
            cd ~/lyra
            git fetch origin "$BRANCH"
            # Check out + hard-reset to the pushed branch (idempotent; survives
            # force-pushes). .env files are gitignored, so they're untouched.
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            bash scripts/deploy-vps.sh
