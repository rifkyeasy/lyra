name: CI

# Typecheck + lint + unit/integration tests on every push and PR to main or dev.
# Integration tests (live mainnet dry-runs) self-skip without LYRA_RUN_INTEGRATION
# + a key, so CI stays deterministic and secret-free.
on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'knowledge-sui/**'
      - '**/*.md'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.7

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit + integration tests
        run: bun run test
